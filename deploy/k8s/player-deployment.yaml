apiVersion: apps/v1
kind: Deployment
metadata:
  name: player
  namespace: cultivation-game
  labels:
    app: player
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: player
  template:
    metadata:
      labels:
        app: player
    spec:
      containers:
        - name: player
          image: cultivation-game/player:latest
          ports:
            - containerPort: 50061
              name: grpc
          envFrom:
            - configMapRef:
                name: cultivation-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 50061
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 50061
            initialDelaySeconds: 5
            periodSeconds: 10

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-services-hpa
  namespace: cultivation-game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ranking
  namespace: cultivation-game
  labels:
    app: ranking
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ranking
  template:
    metadata:
      labels:
        app: ranking
    spec:
      containers:
        - name: ranking
          image: cultivation-game/ranking:latest
          ports:
            - containerPort: 8089
              name: http
          envFrom:
            - configMapRef:
                name: cultivation-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8089
            initialDelaySeconds: 5
            periodSeconds: 10

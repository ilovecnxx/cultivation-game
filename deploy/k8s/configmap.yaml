apiVersion: v1
kind: ConfigMap
metadata:
  name: cultivation-config
  namespace: cultivation-game
data:
  GATEWAY_ADDR: "gateway:8080"
  AUTH_SERVICE_ADDR: "auth:50060"
  PLAYER_SERVICE_ADDR: "player:50061"
  CULTIVATION_SERVICE_ADDR: "cultivation:50062"
  COMBAT_SERVICE_ADDR: "combat:50063"
  SOCIAL_SERVICE_ADDR: "social:50064"
  WORLD_SERVICE_ADDR: "world:50065"

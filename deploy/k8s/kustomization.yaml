  - cultivation-service.yaml
  - combat-deployment.yaml
  - combat-service.yaml
  - social-deployment.yaml
  - social-service.yaml
  - world-deployment.yaml
  - world-service.yaml
  - trade-deployment.yaml
  - trade-service.yaml
  - ranking-deployment.yaml
  - ranking-service.yaml

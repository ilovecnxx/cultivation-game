syntax = "proto3";
package game;
option go_package = "cultivation-game/proto/gateway";

import "common.proto";

// 心跳
message HeartbeatReq {
  int64 client_time = 1;
}

message HeartbeatResp {
  int64 server_time = 1;
  int64 interval_ms = 2;  // 建议心跳间隔
}

// 断线重连
message ReconnectReq {
  string session_id = 1;
  uint64 player_id = 2;
  string token = 3;
}

message ReconnectResp {
  bool success = 1;
  string new_session_id = 2;
  PlayerStateSnapshot snapshot = 3;
}

message PlayerStateSnapshot {
  uint64 player_id = 1;
  string scene_id = 2;
  int32 hp = 3;
  int32 mp = 4;
  int64 last_action_time = 5;
}

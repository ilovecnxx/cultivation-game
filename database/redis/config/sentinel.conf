# ============================================================
# Redis Sentinel 配置文件 - 修仙游戏高可用
# ============================================================

# Sentinel 监控的 Master 名称, IP, 端口, 投票数
sentinel monitor cultivation-cluster redis-master-0 6379 2

# 密码认证 (如果 Redis 设置了 requirepass)
# sentinel auth-pass cultivation-cluster YourStrongPassword123

# 判定节点主观下线的时间 (毫秒)
sentinel down-after-milliseconds cultivation-cluster 5000

# 故障转移超时时间 (毫秒)
sentinel failover-timeout cultivation-cluster 30000

# 同时并行同步的从库数量 (故障切换后)
sentinel parallel-syncs cultivation-cluster 1

# 是否允许 Sentinel 在执行故障转移时同时使用其他 Sentinel 连接
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# 日志
logfile /var/log/redis/sentinel.log
loglevel notice

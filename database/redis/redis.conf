# ============================================================
# Redis 配置文件 - 修仙游戏
# ============================================================

# 守护进程模式 (Docker 环境下通常设为 no, 前台运行)
daemonize no

# PID 文件
pidfile /var/run/redis_6379.pid

# 监听地址 (允许局域网访问)
bind 0.0.0.0

# 监听端口
port 6379

# TCP  backlog
tcp-backlog 511

# 客户端连接超时 (秒, 0 = 不超时)
timeout 0

# TCP keepalive
tcp-keepalive 300

# ==================== 日志 ====================
loglevel notice
logfile /var/log/redis/redis.log

# ==================== 数据库 ====================
# 修仙游戏通常只需要 1 个 DB, 用 Key 前缀区分业务
databases 16

# ==================== 快照 (RDB) ====================
# 数据持久化条件:
#   900 秒内至少 1 个 Key 变化
#   300 秒内至少 10 个 Key 变化
#   60 秒内至少 10000 个 Key 变化
save 900 1
save 300 10
save 60 10000

# RDB 文件名称
dbfilename dump.rdb

# RDB 文件目录
dir /data

# RDB 压缩
rdbcompression yes

# RDB 校验和
rdbchecksum yes

# 停止写入如果 RDB 持久化失败
stop-writes-on-bgsave-error yes

# ==================== AOF ====================
# 开启 AOF (与 RDB 双开, 兼顾重启速度和数据安全)
appendonly yes

# AOF 文件名称
appendfilename "appendonly.aof"

# fsync 策略:
#   always    - 最安全, 最慢 (每条命令都刷盘)
#   everysec  - 推荐, 每秒刷盘, 最多丢 1 秒数据
#   no        - 最快, 由 OS 决定刷盘时机
appendfsync everysec

# 重写期间不进行 fsync, 防止磁盘 IO 冲突
no-appendfsync-on-rewrite no

# AOF 自动重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF 加载时忽略尾部不完整数据
aof-load-truncated yes

# AOF 使用 RDB 前缀 (Redis 7.2 特性, 更快的重写)
aof-use-rdb-preamble yes

# ==================== 内存管理 ====================
# 最大内存限制 (根据服务器配置调整)
# 生产环境推荐预留 20% 系统内存给 OS 和其他进程
maxmemory 4gb

# 内存淘汰策略: allkeys-lru
# 所有 Key 都参与 LRU 淘汰, 不区分是否设置了 TTL
# 适用于修仙游戏: 热点数据集中, 冷数据自动淘汰
maxmemory-policy allkeys-lru

# LRU 采样样本数 (越大越精确, 越消耗 CPU)
maxmemory-samples 10

# 从库忽略 maxmemory (从库不主动淘汰)
replica-ignore-maxmemory yes

# ==================== Cluster ====================
# 开启集群模式
cluster-enabled yes

# 集群配置文件 (由 Redis 自动维护)
cluster-config-file nodes.conf

# 集群节点超时时间 (毫秒)
cluster-node-timeout 5000

# 集群迁移时允许读写
cluster-allow-reads-when-down yes

# 从库可以处理读请求 (减轻主库压力)
cluster-replica-validity-factor 10

# 至少需要多少个 Master 在线才提供服务
cluster-migration-barrier 1

# 集群槽位完全覆盖才能提供服务 (关闭, 部分节点故障仍提供有限服务)
cluster-require-full-coverage no

# ==================== 安全 ====================
# 密码认证 (生产环境必须设置)
# requirepass YourStrongPassword123
# masterauth YourStrongPassword123

# 禁用高危命令 (重命名为空字符串即禁用)
rename-command KEYS ""
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
rename-command MONITOR ""
rename-command BGREWRITEAOF "shadow_rewrite_aof"
rename-command BGSAVE "shadow_bgsave"
rename-command SAVE "shadow_save"

# ==================== 慢查询日志 ====================
# 慢查询阈值 (微秒, 10000 = 10ms)
slowlog-log-slower-than 10000

# 最多记录多少条慢查询
slowlog-max-len 128

# ==================== 连接限制 ====================
# 最大客户端连接数
maxclients 10000

# 连接池相关
timeout 0

# ==================== 延迟监控 ====================
# 延迟监控阈值 (毫秒, 0 = 关闭)
latency-monitor-threshold 100

# ==================== 键空间通知 (Pub/Sub) ====================
# 通知事件:
#   E  - Key 过期事件
#   g  - 通用命令 (del, expire, rename, ...)
#   $  - String 命令
#   l  - List 命令
#   s  - Set 命令
#   h  - Hash 命令
#   z  - Sorted Set 命令
#   x  - 过期事件
#   e  - 淘汰事件
#   A  - g$lshzxe 的别名
#
# 修仙游戏需要监听 Key 过期和淘汰事件, 用于缓存一致性
notify-keyspace-events Exe

# ==================== 高级配置 ====================

# Hash 编码优化: 当 field 数量少于设置值且每个值小于设置大小时使用 ziplist
hash-max-listpack-entries 512
hash-max-listpack-value 64

# List 编码优化
list-max-listpack-size -2

# Set 编码优化
set-max-intset-entries 512

# Sorted Set 编码优化
zset-max-listpack-entries 128
zset-max-listpack-value 64

# 动态哈希: 当子哈希表负载因子超过以下值时 rehash
hash-max-ziplist-value 64

# 活动重哈希 (后台渐进式 rehash)
activerehashing yes

# 客户端输出缓冲区限制
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# 设置 Hz (Redis 后台任务的执行频率)
hz 10

# 动态 Hz (根据客户端数量自动调整)
dynamic-hz yes

# AOF 重写期间允许增量 fsync
aof-rewrite-incremental-fsync yes

# 碎片整理 (自动内存碎片整理, Redis 7.2)
# 开启后 Redis 会在后台整理内存碎片, 减少 RSS 用量
activdefrag yes
active-defrag-threshold-lower 10
active-defrag-threshold-upper 100
active-defrag-ignore-bytes 100mb
active-defrag-cycle-min 1
active-defrag-cycle-max 25
active-defrag-max-scan-fields 1000

# ==================== I/O 线程 (Redis 7.2) ====================
# 开启 IO 多线程处理网络读写, 提高吞吐
# 建议设置为 CPU 核心数的一半, 不要超过 8
io-threads 4
# 主线程也参与 IO 处理
io-threads-do-reads yes

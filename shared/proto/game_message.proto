syntax = "proto3";
package game;

option go_package = "cultivation-game/shared/proto;proto";

// GameMessage - 统一消息信封
message GameMessage {
  uint32 msg_id = 1;      // 消息类型ID
  uint64 seq = 2;         // 序列号(保证顺序)
  int64 timestamp = 3;    // 时间戳
  bytes payload = 4;      // 业务数据(protobuf编码)
  uint32 status = 5;      // 状态码(0=成功)
  string error_msg = 6;   // 错误信息
}

// 修炼消息
message CultivateReq { uint32 technique_id = 1; uint32 duration = 2; }
message CultivateResp { uint64 exp_gained = 1; uint32 new_realm = 2; bool breakthrough = 3; }

// 战斗消息
message CombatAction { uint32 skill_id = 1; uint64 target_id = 2; }
message CombatRound { string description = 1; int64 damage = 2; bool is_critical = 3; uint64 attacker_id = 4; }

// 玩家基础信息
message PlayerInfo {
  uint64 id = 1;
  string nickname = 2;
  uint32 realm_id = 3;
  uint32 realm_level = 4;
  uint64 exp = 5;
  string spirit_root = 6;  // 灵根属性
}

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    pipeline_stages:
      - docker: {}

    static_configs:
      - targets: ["localhost"]
        labels:
          job: "game-logs"
          __path__: /var/lib/docker/containers/*/*-json.log

  - job_name: game-applications
    pipeline_stages:
      - json:
          expressions:
            level: level
            service: service
            module: module
      - labels:
          level:
          service:
          module:

    static_configs:
      - targets: ["localhost"]
        labels:
          job: "game-app"
          __path__: /var/log/game/*.log
